[build]
  command = "NODE_OPTIONS='--max-old-space-size=8192' npm run build"
    publish = ".next"

    [build.environment]
      NODE_VERSION = "18.17.0"

      [[plugins]]
        package = "@netlify/plugin-nextjs"

        # NOTE: Development URL redirects are handled in middleware.ts (line 96-102)
        # Do NOT add Netlify redirects for /developments/* — they conflict with
        # the Next.js plugin and break valid development page slugs like /developments/casa-altaris

        # Security headers
        [[headers]]
          for = "/*"
            [headers.values]
                X-Frame-Options = "DENY"
                    X-Content-Type-Options = "nosniff"
                        Referrer-Policy = "strict-origin-when-cross-origin"

                        # Cache static assets
                        [[headers]]
                          for = "/images/*"
                            [headers.values]
                                Cache-Control = "public, max-age=31536000, immutable"

                                [[headers]]
                                  for = "/_next/static/*"
                                    [headers.values]
                                        Cache-Control = "public, max-age=31536000, immutable"
                                        
